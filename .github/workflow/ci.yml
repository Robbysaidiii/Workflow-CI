name: ML Pipeline 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run MLflow Project
        run: |
          mlflow run . -P data_path=data_preprocessed.csv

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: mlruns/0/

  docker:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: mlruns/0/

      - name: Build and Push Docker Image
        run: |
          LATEST_RUN=$(ls -td mlruns/0/* | head -1)
          echo "Using model path: $LATEST_RUN/artifacts/model"
          mlflow models build-docker -m $LATEST_RUN/artifacts/model -n salary-model
          docker tag salary-model ${{ secrets.DOCKER_USERNAME }}/salary-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/salary-model:latest
