name: Train Model with MLflow

on:
  push:
    paths:
      - 'MLProject/**'
      - '.github/workflows/train.yml'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: salary-env
          environment-file: MLProject/conda.yaml
          auto-activate-base: false

      - name: Install mlflow CLI
        run: |
          pip install mlflow

      - name: Run MLflow project
        working-directory: MLProject
        run: |
          mlflow run . -P data_path=data_preprocessed.csv

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/mlruns/  # atau folder output model jika beda

  build_and_push_docker:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image with MLflow
        working-directory: MLProject
        run: |
          pip install mlflow
          mlflow models build-docker -m mlruns/0/**/artifacts/model -n salary-model
          docker tag salary-model ${{ secrets.DOCKER_USERNAME }}/salary-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/salary-model:latest
