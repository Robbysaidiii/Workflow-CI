name: Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: mlflow-env
          environment-file: MLProject/conda.yaml
          auto-update-conda: true
          conda-solver: classic

      - name: Run MLflow Project
        shell: bash -l {0}
        working-directory: MLProject
        run: |
          conda activate mlflow-env
          mlflow run . -P data_path=data_preprocessed.csv

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: mlruns

  docker:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: mlflow-env
          environment-file: MLProject/conda.yaml
          auto-update-conda: true
          conda-solver: classic

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: mlruns

      - name: Debug artifact path
        run: |
          echo "Listing mlruns directory:"
          ls -R mlruns

      - name: Set model path from latest run
        id: set_model_path
        run: |
          LATEST_RUN=$(find mlruns -type f -name "meta.yaml" | sort | tail -n 1 | xargs dirname)
          echo "MODEL_PATH=$LATEST_RUN/artifacts/model.pkl" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        shell: bash -l {0}
        run: |
          conda activate mlflow-env
          mlflow models build-docker -m $MODEL_PATH -n salary-model
          docker tag salary-model ${{ secrets.DOCKER_USERNAME }}/income-classification:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/income-classification:latest
