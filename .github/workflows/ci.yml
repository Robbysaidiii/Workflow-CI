name: ML Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.training.outputs.run_id }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: mlflow-env
          environment-file: MLProject/conda.yaml
          auto-update-conda: true
          conda-solver: classic

      - name: Install Dependencies
        shell: bash -l {0}
        run: |
          conda activate mlflow-env
          pip install mlflow dagshub scikit-learn pandas

      - name: Run MLflow Project (log to DagsHub)
        id: training
        shell: bash -l {0}
        working-directory: MLProject
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/Robbysaidiii/my-first-repo.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PASSWORD }}
        run: |
          conda activate mlflow-env
          
          # Clear any orphaned run state
          unset MLFLOW_RUN_ID || true
          
          # Run MLflow project
          mlflow run . -P data_path=data_preprocessed.csv
          
          # Get the latest run ID for this experiment
          RUN_ID=$(python -c "
          import mlflow
          import dagshub
          dagshub.init(repo_owner='Robbysaidiii', repo_name='my-first-repo', mlflow=True)
          mlflow.set_experiment('Income Classification Tuning')
          experiment = mlflow.get_experiment_by_name('Income Classification Tuning')
          runs = mlflow.search_runs(experiment_ids=[experiment.experiment_id], max_results=1)
          print(runs.iloc[0]['run_id'])
          ")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

  docker:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: mlflow-env
          environment-file: MLProject/conda.yaml
          auto-update-conda: true
          conda-solver: classic

      - name: Install MLflow and DagsHub
        shell: bash -l {0}
        run: |
          conda activate mlflow-env
          pip install mlflow dagshub

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download model artifact from DagsHub
        shell: bash -l {0}
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/Robbysaidiii/my-first-repo.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PASSWORD }}
        run: |
          conda activate mlflow-env
          
          # Initialize DagsHub connection
          python -c "
          import dagshub
          dagshub.init(repo_owner='Robbysaidiii', repo_name='my-first-repo', mlflow=True)
          "
          
          # Get the latest successful run
          LATEST_RUN_ID=$(python -c "
          import mlflow
          import dagshub
          dagshub.init(repo_owner='Robbysaidiii', repo_name='my-first-repo', mlflow=True)
          mlflow.set_experiment('Income Classification Tuning')
          experiment = mlflow.get_experiment_by_name('Income Classification Tuning')
          runs = mlflow.search_runs(
              experiment_ids=[experiment.experiment_id], 
              filter_string='status = \"FINISHED\"',
              order_by=['start_time DESC'],
              max_results=1
          )
          if len(runs) > 0:
              print(runs.iloc[0]['run_id'])
          else:
              raise Exception('No successful runs found')
          ")
          
          echo "Using run ID: $LATEST_RUN_ID"
          
          # Download model artifacts
          mlflow artifacts download \
            --run-id "$LATEST_RUN_ID" \
            --artifact-path "model" \
            -d dags_model

      - name: Build and Push Docker Image
        shell: bash -l {0}
        run: |
          conda activate mlflow-env
          mlflow models build-docker -m dags_model -n salary-model
          docker tag salary-model ${{ secrets.DOCKER_USERNAME }}/income-classification:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/income-classification:latest